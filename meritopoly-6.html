function buildNames() {

      '<div style="width:12px;height:12px;border-radius:50%;background:' + COLORS[i] + ';flex-shrink:0"></div>' +
      '<input id="pn'+i+'" type="text" value="'+oldVal+'" placeholder="Gracz '+(i+1)+'" maxlength="12" ' +
        'style="flex:1;padding:10px;background:#222;color:#fff;border:1px solid #444;border-radius:8px;font-size:16px">' +
    '</div>';
  }
  document.getElementById('names').innerHTML = html;
}

function startGame() {
  var n = parseInt(document.getElementById('pc').value);
  var players = [];
  for (var i = 0; i < n; i++) {
    var el = document.getElementById('pn'+i);
    players.push({ name: (el && el.value.trim()) || 'Gracz '+(i+1), color: COLORS[i], ects: 0, pos: 0, skip: 0 });
  }
  G = { players: players, cur: 0, used: {}, qcat:null, qdiff:null, qobj:null, qshuf:null, qplayer:null };
  showGame();
}

// ── BOARD (HTML table, monopoly layout) ──
function cell(fi) {
  if (fi === null) {
    return '<td style="background:#12111a;width:11.1%;height:11.1vw;max-height:52px"></td>';
  }
  var f = FIELDS[fi];
  var bg = FIELD_COLORS[f.t] || '#222';
  var pawns = '';
  G.players.forEach(function(pl) {
    if (pl.pos === fi) {
      pawns += '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+pl.color+';border:1px solid rgba(255,255,255,0.6);margin:1px"></span>';
    }
  });
  return '<td style="background:'+bg+';border-radius:3px;padding:1px;text-align:center;vertical-align:middle;width:11.1%;height:11.1vw;max-height:52px">' +
    '<div style="font-size:clamp(9px,2.8vw,16px);line-height:1">'+f.i+'</div>' +
    '<div style="font-size:clamp(4px,1.1vw,7px);color:#ccc;line-height:1.1">'+f.n+'</div>' +
    (pawns ? '<div>'+pawns+'</div>' : '') +
  '</td>';
}

function renderBoard() {
  var grid = [];
  var r, c;
  for (r = 0; r < 9; r++) { grid[r] = []; for (c = 0; c < 9; c++) grid[r][c] = null; }
  for (c = 0; c < 9; c++) grid[8][c] = c;           // bottom L→R fi 0-8
  for (r = 7; r >= 1; r--) grid[r][8] = 9+(7-r);    // right  B→T fi 9-15
  for (c = 8; c >= 0; c--) grid[0][c] = 16+(8-c);   // top    R→L fi 16-24
  for (r = 1; r <= 7; r++) grid[r][0] = 25+(r-1);   // left   T→B fi 25-31

  var html = '<table style="width:min(96vw,460px);border-collapse:separate;border-spacing:2px;table-layout:fixed;margin:0 auto 8px">';
  for (r = 0; r < 9; r++) {
    html += '<tr>';
    for (c = 0; c < 9; c++) {
      html += cell(grid[r][c]);
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

// ── ROLL ──
function doRoll() {
  var btn = document.getElementById('rollbtn');
  if (btn) btn.disabled = true;
  var p = G.players[G.cur];

  if (p.skip > 0) {
    p.skip--;
    showMsg('⏸️', p.name + ' pauzuje', 'Zostałeś w domu. Pozostałe tury: <strong>' + p.skip + '</strong>', 'nextTurn()');
    return;
  }

  var v1 = Math.ceil(Math.random()*6);
  var v2 = Math.ceil(Math.random()*6);
  var steps = v1 + v2;
  var old = p.pos;
  p.pos = (p.pos + steps) % 32;
  if (p.pos < old) p.ects++;

  showMsg('🎲', 'Wyrzuciłeś ' + v1 + ' + ' + v2 + ' = ' + steps,
    'Lądując na: <strong>' + FIELDS[p.pos].i + ' ' + FIELDS[p.pos].n + '</strong>',
    'afterMove()');
}

function afterMove() {
  var p = G.players[G.cur];
  var t = FIELDS[p.pos].t;
  if (t === 'start') { p.ects++; showMsg('🎓','START! +2 ECTS','Wróciłeś na Start!','checkWin()'); }
  else if (t === 'w') openQ('w', p);
  else if (t === 'p') openQ('p', p);
  else if (t === 'k') openQ('k', p);
  else if (t === 'ev') drawCard(p);
  else if (t === 'ses') { p.skip += 2; showMsg('😰','Sesja Poprawkowa!','Czekasz 2 tury.','nextTurn()'); }
  else if (t === 'bon') { p.ects++; showMsg('⭐','+1 ECTS!','Bonus za aktywność!','checkWin()'); }
  else if (t === 'dz') showMsg('🏛️','Dziekanat','Nic nie zyskujesz ani nie tracisz.','nextTurn()');
}

var CNAME = {w:'📚 Wykład',p:'🎬 Pop-kultura',k:'🧠 Wiedza Ogólna'};

function openQ(cat, p) {
  G.qcat = cat; G.qplayer = p;
  render(
    '<div style="text-align:center;margin-bottom:14px"><div style="font-size:28px">'+CNAME[cat]+'</div><h2>Wybierz trudność</h2></div>' +
    '<button onclick="pickDiff(\'easy\')" style="display:block;width:100%;padding:14px;background:#1a3a28;color:#06d6a0;border:2px solid #06d6a0;border-radius:8px;font-size:17px;font-weight:bold;margin-bottom:8px;cursor:pointer">🟢 Łatwe — 1 ECTS</button>' +
    '<button onclick="pickDiff(\'medium\')" style="display:block;width:100%;padding:14px;background:#2e2200;color:#ffd166;border:2px solid #ffd166;border-radius:8px;font-size:17px;font-weight:bold;margin-bottom:8px;cursor:pointer">🟡 Średnie — 2 ECTS</button>' +
    '<button onclick="pickDiff(\'hard\')" style="display:block;width:100%;padding:14px;background:#3a1a1a;color:#ef476f;border:2px solid #ef476f;border-radius:8px;font-size:17px;font-weight:bold;cursor:pointer">🔴 Trudne — 3 ECTS</button>'
  );
}

function pickDiff(diff) {
  G.qdiff = diff;
  var pool = QS[G.qcat].filter(function(q){return q.d===diff;});
  var key = G.qcat+'_'+diff;
  if (!G.used[key]) G.used[key] = [];
  var avail = pool.filter(function(q,i){return G.used[key].indexOf(i)===-1;});
  if (!avail.length) { G.used[key]=[]; avail=pool; }
  var idx = Math.floor(Math.random()*avail.length);
  var q = avail[idx];
  G.used[key].push(pool.indexOf(q));
  G.qobj = q;
  var shuf = q.a.map(function(t,o){return{t:t,o:o};});
  for(var i=shuf.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=shuf[i];shuf[i]=shuf[j];shuf[j]=tmp;}
  G.qshuf = shuf;
  showQ();
}

function showQ() {
  var q = G.qobj; var shuf = G.qshuf; var diff = G.qdiff;
  var dname = diff==='easy'?'Łatwe (1 ECTS)':diff==='medium'?'Średnie (2 ECTS)':'Trudne (3 ECTS)';
  var btns = shuf.map(function(a,i){
    return '<button onclick="answer('+i+')" id="ab'+i+'" style="display:block;width:100%;padding:12px;background:#222;color:#fff;border:2px solid #444;border-radius:8px;font-size:15px;text-align:left;margin-bottom:7px;cursor:pointer">'+a.t+'</button>';
  }).join('');
  render(
    '<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">'+CNAME[G.qcat]+' · '+dname+'</div>' +
    '<h3 style="margin-bottom:14px;line-height:1.4">'+q.q+'</h3>' +
    '<div id="answers">'+btns+'</div>'
  );
}

function answer(idx) {
  var shuf=G.qshuf; var q=G.qobj; var p=G.qplayer;
  // disable all
  for(var i=0;i<shuf.length;i++){var b=document.getElementById('ab'+i);if(b)b.disabled=true;}
  var correctDisp=shuf.findIndex(function(a){return a.o===q.c;});
  var correct=shuf[idx].o===q.c;
  var btn=document.getElementById('ab'+idx);
  var correctBtn=document.getElementById('ab'+correctDisp);
  if(correct){
    if(btn) btn.style.background='#06d6a0', btn.style.color='#000', btn.style.borderColor='#06d6a0';
    p.ects+=DPTS[G.qdiff];
    setTimeout(function(){showMsg('✅','Poprawna odpowiedź!','+'+DPTS[G.qdiff]+' ECTS','checkWin()');},700);
  } else {
    if(btn) btn.style.background='#ef476f', btn.style.color='#fff', btn.style.borderColor='#ef476f';
    if(correctBtn) correctBtn.style.background='#06d6a0', correctBtn.style.color='#000', correctBtn.style.borderColor='#06d6a0';
    setTimeout(function(){showMsg('❌','Błędna odpowiedź!','Poprawna: <strong>'+shuf[correctDisp].t+'</strong>','nextTurn()');},800);
  }
}

  {i:'📱',t:'Złapany na telefonie',txt:'Wykładowca Cię przyłapał!',fx:function(p){p.ects=Math.max(0,p.ects-1);return'-1 ECTS';}},
  {i:'😴',t:'Zasnąłeś',txt:'Cofasz się o 2 pola.',fx:function(p){p.pos=(p.pos-2+32)%32;return'Cofasz się 2 pola';}},
  {i:'🚀',t:'Erasmus!',txt:'Przeskakujesz 3 pola!',fx:function(p){p.pos=(p.pos+3)%32;return'Przeskakujesz 3 pola';}}
];

function drawCard(p) {
  var card=CARDS[Math.floor(Math.random()*CARDS.length)];
  var res=card.fx(p);
  var next = res.charAt(0)==='+' ? 'checkWin()' : 'nextTurn()';
  showMsg(card.i, card.t, card.txt+'<br><br><strong style="color:#ffd166">'+res+'</strong>', next);
}

// ── WIN / NEXT ──
function checkWin() {
  var p = G.players[G.cur];
  if (p.ects >= 30) {
    var sorted=G.players.slice().sort(function(a,b){return b.ects-a.ects;});
    var ranks=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
    var rows=sorted.map(function(pl,i){
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
        '<span style="font-size:20px">'+ranks[i]+'</span>'+
        '<div style="width:11px;height:11px;border-radius:50%;background:'+pl.color+'"></div>'+
        '<span style="flex:1">'+pl.name+'</span>'+
        '<strong>'+pl.ects+' ECTS</strong>'+
      '</div>';
    }).join('');
    render(
      '<div style="text-align:center;padding:20px 0">'+
      '<div style="font-size:60px">🏆</div>'+
      '<h1 style="color:#ffd166">'+p.name+' wygrywa!</h1>'+
      '<p style="color:#aaa;margin-bottom:20px">Zaliczył rok akademicki!</p>'+
      '</div>'+rows+
      '<br><button onclick="showSetup()" style="width:100%;padding:14px;background:#ff6b35;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer">🔄 Zagraj ponownie</button>'
    );
  } else {
    nextTurn();
  }
}

function nextTurn() {
  G.cur = (G.cur+1) % G.players.length;
  showGame();
}

// ── START ──
showSetup();
</script>
